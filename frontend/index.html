<!DOCTYPE html>
<html>
<head>
    <title>Student Registration System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Student Registration</h1>

    <form id="studentForm">

        <input type="text" id="name" placeholder="Enter Name" required>

        <input type="text" id="enrollment" placeholder="Enrollment Number (0801XX24XXXX)" required>

        <input type="email" id="email" placeholder="Email Address" required>

        <input type="text" id="mobile" placeholder="Mobile Number (without +91)" required>

        <input type="text" id="branch" placeholder="Branch" required>

        <button type="submit">Register as Student</button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
